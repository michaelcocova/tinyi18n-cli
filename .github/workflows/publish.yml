name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      # 只发布 tag
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js registry
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      # 安装依赖
      - name: Install
        run: pnpm install

      # 确保 tag 提交在 main 分支上，避免从其他分支打 tag 误发 npm。
      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      # Lint 代码
      - name: Lint
        run: pnpm run lint

      # 构建代码
      - name: Build
        run: pnpm run build

      # 发布到 npm
      - name: Publish to npm
        run: cd packages/cli && npm publish --access public --registry https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
